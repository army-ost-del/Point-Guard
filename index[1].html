<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#161A1D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Point Guard — Ironside Basketball</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
  :root {
    --court:       #C8762A;
    --court-d:     #A0541C;
    --court-line:  #F4E3C8;
    --ink:         #1A1410;
    --paper:       #FFF8EC;
    --board:       #161A1D;
    --board-d:     #0D0F11;
    --home:        #E0481F;
    --home-d:      #A8300E;
    --away:        #1C8CD6;
    --away-d:      #115C92;
    --good:        #3FA34D;
    --good-d:      #2C7C38;
    --warn:        #F0A202;
    --warn-d:      #C5840A;
    --muted:       #8A8178;
    --fire:        #FF5E1A;
    --fire-d:      #C73E0A;
    --fire-glow:   #FFC247;
    --crowd-1:     #2A2F38;
    --crowd-2:     #3A4250;
    --crowd-3:     #4C5668;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0; padding: 0;
    height: 100%;
    overflow: hidden;
    background: var(--board-d);
  }

  body {
    font-family: Arial, "Helvetica Neue", sans-serif;
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-user-select: none;
    user-select: none;
  }

  .display {
    font-family: "Arial Black", Arial, sans-serif;
    font-weight: 900;
    letter-spacing: 0.02em;
  }

  /* ---------- Court background ---------- */
  #bg {
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(90deg, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 2px, transparent 2px, transparent 38px),
      linear-gradient(160deg, var(--court) 0%, var(--court-d) 100%);
    overflow: hidden;
    z-index: 0;
  }
  #bg svg {
    position: absolute;
    top: 50%; left: 50%;
    width: 130vmin;
    height: 130vmin;
    transform: translate(-50%,-50%);
    opacity: 0.16;
  }

  /* ---------- App shell ---------- */
  #app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    height: 100%;
    max-height: 900px;
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top, 0px) 14px env(safe-area-inset-bottom, 14px);
  }

  /* ---------- Scoreboard ---------- */
  #scoreboard {
    flex-shrink: 0;
    margin-top: env(safe-area-inset-top, 14px);
    background: linear-gradient(180deg, var(--board) 0%, var(--board-d) 100%);
    border-radius: 14px;
    padding: 0 14px 10px;
    box-shadow: 0 10px 26px rgba(0,0,0,0.45), inset 0 0 0 1px rgba(255,255,255,0.05);
    color: #fff;
    overflow: hidden;
  }

  .crowd-strip {
    width: calc(100% + 28px);
    margin: 0 -14px 8px;
    height: 26px;
    overflow: hidden;
    background: linear-gradient(180deg, #15181C 0%, #0D0F11 100%);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .crowd-strip svg { width: 100%; height: 100%; display: block; }
  .crowd-dot {
    animation: crowdBob 1.8s ease-in-out infinite;
    transform-origin: center;
  }
  @keyframes crowdBob {
    0%, 100% { transform: translateY(0) scale(1); opacity: 0.85; }
    50%      { transform: translateY(-1.5px) scale(1.08); opacity: 1; }
  }
  .crowd-strip.cheering .crowd-dot {
    animation: crowdCheer 0.35s ease-in-out infinite;
  }
  @keyframes crowdCheer {
    0%, 100% { transform: translateY(0) scale(1); }
    50%      { transform: translateY(-4px) scale(1.25); }
  }
  @media (prefers-reduced-motion: reduce) {
    .crowd-dot { animation: none !important; }
  }

  .sb-logo {
    display: flex;
    justify-content: center;
    margin-bottom: 2px;
  }
  .sb-logo svg { display: block; }

  .sb-teams {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .sb-team {
    flex: 1;
    text-align: center;
  }
  .sb-team .label {
    font-size: 10px;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.55);
    margin-bottom: 2px;
  }
  .sb-team.home .label { color: var(--home); }
  .sb-team.away .label { color: #6E9CC9; }
  .sb-team .score {
    font-size: 34px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .heat-row {
    display: flex;
    justify-content: center;
    gap: 2px;
    margin-top: 3px;
    height: 12px;
  }
  .heat-flame {
    font-size: 11px;
    opacity: 0.18;
    filter: grayscale(1);
    line-height: 1;
    transition: opacity 0.3s, filter 0.3s;
  }
  .heat-flame.lit {
    opacity: 1;
    filter: grayscale(0);
  }
  .heat-flame.on-fire {
    animation: flameFlicker 0.7s ease-in-out infinite;
  }
  @keyframes flameFlicker {
    0%, 100% { transform: scale(1) translateY(0); }
    50%      { transform: scale(1.18) translateY(-1px); }
  }

  .sb-team.on-fire .score {
    color: var(--fire-glow);
    text-shadow: 0 0 10px rgba(255,94,26,0.8), 0 0 18px rgba(255,94,26,0.4);
  }

  @media (prefers-reduced-motion: reduce) {
    .heat-flame.on-fire { animation: none !important; }
  }

  .sb-mid {
    text-align: center;
    padding: 0 6px;
    flex-shrink: 0;
  }
  .sb-mid .q {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--warn);
  }
  .sb-mid .clock {
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    margin-top: 1px;
  }

  .momentum-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    margin-top: 5px;
    font-size: 10px;
    font-weight: bold;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }
  .momentum-label { font-size: 8.5px; opacity: 0.85; }
  .momentum-arrow {
    font-size: 11px;
    letter-spacing: -1px;
  }
  .momentum-row.momentum-home,
  .momentum-row.momentum-home .momentum-arrow {
    color: #4ADE80;
  }
  .momentum-row.momentum-away,
  .momentum-row.momentum-away .momentum-arrow {
    color: #4ADE80;
  }
  .momentum-row.momentum-even {
    color: rgba(255,255,255,0.4);
  }
  .momentum-dash { font-size: 10px; }

  .sb-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 9px;
    padding-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.12);
    font-size: 11px;
    color: rgba(255,255,255,0.65);
  }
  .mute-btn {
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.7);
    font-size: 15px;
    cursor: pointer;
    padding: 2px 4px;
    line-height: 1;
  }
  .mute-btn:active { transform: scale(0.9); }
  .sb-meta .grp { display: flex; align-items: center; gap: 5px; }
  .timeout-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--warn);
    display: inline-block;
  }
  .timeout-dot.used { background: rgba(255,255,255,0.2); }
  .foul-count { font-weight: bold; color: #fff; }
  .foul-count.bonus { color: var(--warn); }

  /* ---------- Card stage ---------- */
  #maincontent {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  #courtpanel {
    display: none;
  }

  #stage {
    flex: 1;
    position: relative;
    min-height: 0;
    margin-top: 14px;
  }

  /* Desktop: widen the whole shell and split into a persistent
     court pane (always visible) + a narrower card pane beside it. */
  @media (min-width: 980px) {
    #app { max-width: 1180px; max-height: 800px; }
    #maincontent {
      flex-direction: row;
      gap: 18px;
      margin-top: 14px;
    }
    #courtpanel {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1.35;
      min-width: 0;
      background: linear-gradient(180deg, var(--board) 0%, var(--board-d) 100%);
      border-radius: 16px;
      box-shadow: 0 10px 26px rgba(0,0,0,0.45), inset 0 0 0 1px rgba(255,255,255,0.05);
      padding: 22px;
    }
    #courtpanel .court-diagram-wrap.fullcourt {
      max-width: none;
      width: 100%;
      height: 260px;
    }
    #courtpanel .court-diagram-wrap.fullcourt svg {
      min-height: 0;
      width: 100%;
      height: 205px;
    }
    #stage {
      flex: 1;
      margin-top: 0;
      max-width: 460px;
    }
    /* In-card court diagrams are redundant once the persistent
       panel is showing the same thing — hide them on desktop. */
    .card .court-diagram-wrap.fullcourt {
      display: none;
    }
    /* Compact vertical rhythm so a full decision card fits without
       scrolling on a typical laptop screen. */
    .card { padding: 18px 26px 18px; }
    .btn-grid { gap: 7px; margin-top: 10px; }
    button.act { padding: 10px 12px; font-size: 14px; }
    button.act .sub { font-size: 10px; }
    .headline { font-size: 21px; margin-bottom: 8px; }
    .eyebrow { margin-bottom: 5px; }
    .awareness-tip { padding: 6px 10px; font-size: 12px; margin-bottom: 6px; }
    .hint-btn { padding: 7px 10px; font-size: 12px; margin-top: 4px; }
  }

  .card {
    position: absolute;
    left: 0; top: 50%;
    transform: translateY(-50%);
    width: 100%;
    background: var(--paper);
    border-radius: 18px;
    padding: 26px 22px 22px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4), 0 2px 0 rgba(255,255,255,0.5) inset;
    display: flex;
    flex-direction: column;
    min-height: 62%;
    max-height: 100%;
    overflow-y: auto;
    border-top: 5px solid var(--home);
  }
  .card.cpu-turn { border-top-color: var(--away); }
  .card.neutral-turn { border-top-color: var(--warn); }

  .card.enter { animation: cardIn 0.4s cubic-bezier(.22,1,.36,1) forwards; }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(calc(-50% + 16px)) scale(0.97); }
    to   { opacity: 1; transform: translateY(-50%) scale(1); }
  }
  .card.leaving { animation: cardOut 0.22s ease forwards; }
  @keyframes cardOut {
    from { opacity: 1; transform: translateY(-50%) scale(1); }
    to   { opacity: 0; transform: translateY(calc(-50% - 12px)) scale(0.97); }
  }

  .eyebrow {
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .eyebrow.home-tag { color: var(--home-d); }
  .eyebrow.away-tag { color: var(--away); }
  .eyebrow.coach-tag { color: var(--warn-d); }

  .headline {
    font-family: "Arial Black", Arial, sans-serif;
    font-weight: 900;
    font-size: 26px;
    line-height: 1.12;
    text-transform: uppercase;
    color: var(--ink);
    margin: 0 0 12px;
    letter-spacing: 0.01em;
  }
  .headline.good { color: var(--good-d); }
  .headline.bad { color: var(--home-d); }

  .body-text {
    font-size: 15px;
    line-height: 1.5;
    color: #4A4036;
    margin: 0 0 6px;
  }

  .quality-meter {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 4px 0 14px;
    font-size: 12px;
    color: var(--muted);
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .quality-bars { display: flex; gap: 3px; }
  .qbar { width: 16px; height: 7px; border-radius: 3px; background: rgba(0,0,0,0.12); }
  .qbar.fill-low { background: var(--home); }
  .qbar.fill-mid { background: var(--warn); }
  .qbar.fill-high { background: var(--good); }

  .awareness-row {
    display: flex;
    gap: 14px;
    margin: 2px 0 12px;
    flex-wrap: wrap;
  }
  .awareness-meter {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    color: var(--muted);
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .awareness-meter .aw-label { white-space: nowrap; }
  .awareness-tip {
    font-size: 12.5px;
    line-height: 1.45;
    color: #5A5048;
    background: rgba(240,162,2,0.10);
    border-radius: 9px;
    padding: 8px 11px;
    margin: 0 0 12px;
  }

  .posture-row {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    line-height: 1.3;
    color: #4A4438;
    background: rgba(0,0,0,0.04);
    border-radius: 8px;
    padding: 6px 10px;
    margin: 0 0 7px;
  }
  .posture-row .posture-icon { font-size: 13px; flex-shrink: 0; }

  /* ---------- Speaker badge: who is currently talking ---------- */
  .speaker-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 10px 3px 4px;
    border-radius: 999px;
    font-family: Arial, sans-serif;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .speaker-badge .sb-avatar {
    width: 20px; height: 20px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
    box-shadow: 0 0 0 1.5px rgba(255,255,255,0.6) inset;
  }
  .speaker-badge.speaker-you { background: rgba(224,72,31,0.14); color: var(--home-d); }
  .speaker-badge.speaker-you .sb-avatar { background: var(--home); }
  .speaker-badge.speaker-coach { background: rgba(240,162,2,0.16); color: var(--warn-d); }
  .speaker-badge.speaker-coach .sb-avatar { background: var(--warn-d); }
  .speaker-badge.speaker-away { background: rgba(28,140,214,0.14); color: var(--away-d); }
  .speaker-badge.speaker-away .sb-avatar { background: var(--away); }
  .speaker-badge.speaker-announcer { background: rgba(0,0,0,0.06); color: var(--ink); }
  .speaker-badge.speaker-announcer .sb-avatar { background: #5C5048; }

  .shot-clock-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 11px;
    border-radius: 999px;
    font-family: "Arial Black", Arial, sans-serif;
    font-size: 12px;
    font-weight: 900;
    margin-bottom: 6px;
  }
  .shot-clock-badge.sc-normal { background: rgba(0,0,0,0.06); color: var(--ink); }
  .shot-clock-badge.sc-warning { background: rgba(240,162,2,0.18); color: var(--warn-d); }
  .shot-clock-badge.sc-critical {
    background: rgba(214,40,40,0.16);
    color: var(--home-d);
    animation: scPulse 0.7s ease-in-out infinite;
  }
  @keyframes scPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.55; }
  }
  @media (prefers-reduced-motion: reduce) {
    .shot-clock-badge.sc-critical { animation: none !important; }
  }

  .hint-btn {
    width: 100%;
    border: 1.5px dashed var(--warn-d);
    background: rgba(240,162,2,0.08);
    color: var(--warn-d);
    border-radius: 10px;
    padding: 9px 12px;
    font-size: 12.5px;
    font-weight: bold;
    font-family: Arial, sans-serif;
    cursor: pointer;
    margin-top: 8px;
    transition: filter 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .hint-btn:active { filter: brightness(0.95); }
  .hint-btn:disabled { opacity: 0.4; cursor: default; }
  .hint-btn .hint-cost {
    font-size: 10.5px;
    background: var(--good-d);
    color: #fff;
    padding: 1px 7px;
    border-radius: 8px;
    white-space: nowrap;
  }

  .hint-reveal {
    background: #FFF4DE;
    border: 1.5px solid var(--warn-d);
    border-radius: 12px;
    padding: 12px 14px;
    margin-top: 8px;
    font-size: 13px;
    line-height: 1.5;
    color: #4A3A1A;
  }
  .hint-reveal .hint-rec {
    font-weight: bold;
    color: var(--warn-d);
    font-size: 14px;
    display: block;
    margin-bottom: 4px;
  }

  .decision-summary {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin: 4px 0 8px;
  }
  .decision-pct {
    font-family: "Arial Black", Arial, sans-serif;
    font-weight: 900;
    font-size: 38px;
    color: var(--good-d);
    line-height: 1;
  }
  .decision-pct-label {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.3;
  }
  .decision-example {
    font-size: 13px;
    line-height: 1.5;
    color: #4A4438;
    background: rgba(201,81,46,0.06);
    border-left: 3px solid var(--home);
    border-radius: 0 8px 8px 0;
    padding: 8px 11px;
    margin: 6px 0;
  }

  .coach-box {
    font-size: 13px;
    line-height: 1.5;
    color: #5A4628;
    background: #FBE8C2;
    border: 1.5px dashed var(--warn-d);
    border-radius: 12px;
    padding: 11px 13px;
    margin: 10px 0 4px;
  }
  .coach-box strong { color: var(--warn-d); }

  .fire-banner {
    display: flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(90deg, var(--fire-d) 0%, var(--fire) 100%);
    color: #fff;
    border-radius: 10px;
    padding: 9px 13px;
    margin: 0 0 12px;
    font-weight: bold;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    box-shadow: 0 6px 16px rgba(255,94,26,0.35);
    animation: fireBannerPulse 1.4s ease-in-out infinite;
  }
  .fire-banner.away-fire {
    background: linear-gradient(90deg, var(--away-d) 0%, var(--away) 100%);
    box-shadow: 0 6px 16px rgba(30,58,95,0.35);
  }
  .fire-banner .flame-icon {
    font-size: 18px;
    animation: flameFlicker 0.7s ease-in-out infinite;
  }
  @keyframes fireBannerPulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.015); }
  }

  @media (prefers-reduced-motion: reduce) {
    .fire-banner, .fire-banner .flame-icon { animation: none !important; }
  }

  .play-log {
    font-size: 13px;
    line-height: 1.6;
    color: #6B5F4E;
    background: rgba(0,0,0,0.04);
    border-radius: 10px;
    padding: 10px 12px;
    margin: 6px 0 4px;
  }

  .spacer { flex: 1; }

  /* ---------- Buttons ---------- */
  .btn-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 18px;
  }
  .btn-col { display: flex; flex-direction: column; gap: 10px; margin-top: 18px; }

  button.act {
    border: none;
    border-radius: 12px;
    padding: 14px 10px;
    font-size: 15px;
    font-weight: bold;
    font-family: Arial, sans-serif;
    cursor: pointer;
    transition: transform 0.1s, filter 0.1s;
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  button.act:active { transform: scale(0.96); filter: brightness(0.94); }
  button.act .sub { font-size: 11px; font-weight: normal; opacity: 0.85; }

  button.act.primary { background: var(--home); color: #fff; }
  button.act.secondary { background: var(--away); color: #fff; }
  button.act.tertiary { background: #2B2118; color: #fff; }
  button.act.warn { background: var(--warn); color: #2B2118; }
  button.act.three { background: #6B3FA0; color: #fff; }
  button.act.ghost {
    background: transparent;
    border: 1.5px solid rgba(0,0,0,0.18);
    color: var(--ink);
  }
  button.act.full { grid-column: 1 / -1; }

  button.continue-btn {
    width: 100%;
    border: none;
    border-radius: 12px;
    padding: 15px 16px;
    font-size: 16px;
    font-weight: bold;
    font-family: Arial, sans-serif;
    background: var(--ink);
    color: #fff;
    cursor: pointer;
    margin-top: 18px;
    transition: transform 0.1s, filter 0.1s;
  }
  button.continue-btn:active { transform: scale(0.97); filter: brightness(1.15); }

  /* result badges */
  .result-badge {
    width: 64px; height: 64px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 30px;
    margin-bottom: 12px;
    box-shadow: 0 8px 18px rgba(0,0,0,0.25);
  }
  .result-badge.make { background: var(--good); }
  .result-badge.miss { background: #B0A593; }
  .result-badge.turnover { background: var(--home); }

  /* ---------- Animated action stage ---------- */
  .action-stage-wrap {
    width: 100%;
    height: 96px;
    margin: 2px 0 12px;
    border-radius: 12px;

  }
  .action-stage-wrap svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  @keyframes ballArc {
    0%   { offset-distance: 0%; opacity: 0; }
    8%   { opacity: 1; }
    92%  { opacity: 1; }
    100% { offset-distance: 100%; opacity: 0; }
  }
  .ball-on-path {
    offset-rotate: 0deg;
    animation: ballArc 1.1s ease-in-out infinite;
  }

  @keyframes handRelease {
    0%, 15%  { transform: rotate(0deg); }
    35%      { transform: rotate(-38deg); }
    60%, 100% { transform: rotate(0deg); }
  }
  .hand-release {
    animation: handRelease 1.1s ease-in-out infinite;
    transform-origin: 50% 100%;
  }

  @keyframes rimFlash {
    0%, 55%  { opacity: 0; }
    62%, 75% { opacity: 1; }
    85%, 100% { opacity: 0; }
  }
  .rim-flash { animation: rimFlash 1.1s ease-in-out infinite; }

  @keyframes passSlide {
    0%, 8%   { offset-distance: 0%; opacity: 0; }
    14%      { opacity: 1; }
    86%      { opacity: 1; }
    94%, 100% { offset-distance: 100%; opacity: 0; }
  }
  .ball-on-pass-path { animation: passSlide 1s ease-in-out infinite; }

  @keyframes dribbleBounce {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(14px); }
  }
  .dribble-ball { animation: dribbleBounce 0.55s ease-in-out infinite; }

  @keyframes stripShake {
    0%, 100% { transform: translateX(0) rotate(0deg); }
    20%      { transform: translateX(-3px) rotate(-8deg); }
    40%      { transform: translateX(3px) rotate(8deg); }
    60%      { transform: translateX(-2px) rotate(-5deg); }
    80%      { transform: translateX(2px) rotate(5deg); }
  }
  .strip-shake { animation: stripShake 0.5s ease-in-out infinite; }

  @keyframes flyOff {
    0%   { offset-distance: 0%; opacity: 1; }
    100% { offset-distance: 100%; opacity: 0; }
  }
  .ball-fly-off {
    animation: flyOff 0.9s ease-in infinite;
  }

  @media (prefers-reduced-motion: reduce) {
    .ball-on-path, .hand-release, .rim-flash, .ball-on-pass-path,
    .dribble-ball, .strip-shake, .ball-fly-off { animation: none !important; }
  }

  /* final score card */
  .final-score {

    justify-content: center;

  /* ---------- Tip-off intro screen ---------- */
  .tipoff-matchup {
    display: flex;
    align-items: center;

  }
  .tipoff-city {
    font-size: 11px;

  .tipoff-vs {
    font-family: "Arial Black", Arial, sans-serif;

  /* ---------- Court position diagram ---------- */
  .court-diagram-wrap {

  .court-marker {
