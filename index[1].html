// ---------------------------------------------------------
// Decision report: summarizes how closely your shot selection
// matched the EV-optimal choice across the game, with concrete
// examples of the costliest gaps.
// ---------------------------------------------------------
function buildDecisionReport(decisionLog) {
  const wrap = document.createElement('div');
  if (decisionLog.length === 0) {
    wrap.innerHTML = `<p class="body-text">No shots attempted to grade this game.</p>`;
    return wrap;
  }

  const counts = { drive: 0, shoot: 0, postup: 0, shoot3: 0 };
  decisionLog.forEach(d => counts[d.action] = (counts[d.action] || 0) + 1);
  const optimalCount = decisionLog.filter(d => d.wasOptimal).length;
  const optimalPct = Math.round((optimalCount / decisionLog.length) * 100);

  const labelMap = { drive: 'Drive', shoot: 'Shoot', postup: 'Post Up', shoot3: '3PT Shot' };
  const distLine = Object.keys(counts).filter(k => counts[k] > 0)
    .map(k => `${labelMap[k]} ${counts[k]}`).join(' · ');

  const verdict = optimalPct >= 80 ? "Excellent shot selection — you read the defense well almost every time."
    : optimalPct >= 60 ? "Solid decision-making overall, with a few possessions worth a second look."
    : optimalPct >= 40 ? "Mixed bag — roughly half your shots fought the defense instead of using what it gave you."
    : "Your shot selection didn't match what the defense was giving you most of the game — worth reviewing the misses below.";

  const worstGaps = decisionLog.filter(d => !d.wasOptimal).sort((a, b) => b.gap - a.gap).slice(0, 3);

  let html = `
    <div class="decision-summary">
      <div class="decision-pct">${optimalPct}%</div>
      <div class="decision-pct-label">of your shots matched<br>the best available option</div>
    </div>
    <p class="body-text">${verdict}</p>
    <p class="body-text" style="font-size:13px; color:var(--muted);">Shot mix: ${distLine}</p>
  `;

  if (worstGaps.length > 0) {
    html += `<div class="eyebrow lesson-tag" style="margin-top:10px;">COSTLIEST DECISIONS</div>`;
    worstGaps.forEach(d => {
      const postureDesc = d.posture === 'sagging' ? 'sagging off' : (d.posture === 'tight' ? 'playing tight' : 'set');
      html += `<div class="decision-example">
        You chose <strong>${labelMap[d.action]}</strong> (worth ~${d.evTaken.toFixed(1)} pts) while the defense was ${postureDesc} —
        <strong>${labelMap[d.bestAction]}</strong> was worth ~${d.evBest.toFixed(1)} pts in that exact spot.
      </div>`;
    });
  }

  wrap.innerHTML = html;
  return wrap;
}

// ---------------------------------------------------------
// Arc adaptation: Voltage drifts toward whatever scored on you,
// and away from whatever you shut down, within bounds.
// ---------------------------------------------------------
function applyArcAdaptation() {
  const tally = state.cpuActionTally;
  const rates = {};
  Object.keys(tally).forEach(action => {
    const t = tally[action];
    rates[action] = t.att >= 3 ? (t.made / t.att) : null; // ignore tiny samples
  });

  const validRates = Object.entries(rates).filter(([k, v]) => v !== null);
  if (validRates.length === 0) return [];

  const avg = validRates.reduce((sum, [, v]) => sum + v, 0) / validRates.length;
  const notes = [];

  validRates.forEach(([action, rate]) => {
    const diff = rate - avg;
    // Nudge proportionally to how far this action's success rate was
    // from the game's average, clamped to keep things recognizable.
    const adjust = clamp(1 + diff * 1.4, 0.5, 1.5);
    arcState.cpuActionWeightMods[action] = clamp(
      (arcState.cpuActionWeightMods[action] * 0.5) + (adjust * 0.5), // blend with prior games, don't overcorrect on one game
      0.5, 1.5
    );
    const label = { drive: 'driving', shoot: 'pulling up for jumpers', postup: 'working the post' }[action];
    if (diff > 0.12) notes.push(`Voltage had real success ${label} (${Math.round(rate*100)}%) — expect to see more of it.`);
    else if (diff < -0.12) notes.push(`Voltage struggled ${label} (${Math.round(rate*100)}%) against you — they may pull back from it.`);
  });

  return notes;
}

// ---------------------------------------------------------
// Sound effects — fully synthesized via Web Audio API, no
// external files. A single shared AudioContext, lazily created
// on first user interaction (required by browser autoplay rules).
// ---------------------------------------------------------
const SFX = {
  ctx: null,
  muted: false,

  ensureCtx() {
    if (!this.ctx) {
      try {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      } catch (e) { return null; }
    }
    if (this.ctx.state === 'suspended') {
      this.ctx.resume().catch(() => {});
    }
    return this.ctx;
  },

  tone(freq, duration, opts) {
    if (this.muted) return;
    const ctx = this.ensureCtx();
    if (!ctx) return;
    opts = opts || {};
    const type = opts.type || 'sine';
    const startGain = opts.gain != null ? opts.gain : 0.18;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    if (opts.glideTo) {
      osc.frequency.linearRampToValueAtTime(opts.glideTo, ctx.currentTime + duration);
    }
    gain.gain.setValueAtTime(startGain, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration);
  },

  noise(duration, opts) {
    if (this.muted) return;
    const ctx = this.ensureCtx();
    if (!ctx) return;
    opts = opts || {};
    const bufferSize = ctx.sampleRate * duration;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1);
    const src = ctx.createBufferSource();
    src.buffer = buffer;
    const filter = ctx.createBiquadFilter();
    filter.type = opts.filterType || 'lowpass';
    filter.frequency.value = opts.filterFreq || 1200;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(opts.gain != null ? opts.gain : 0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    src.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    src.start();
  },

  // --- Named game events ---
  make() {
    this.tone(520, 0.12, { type: 'triangle', gain: 0.16, glideTo: 720 });
    setTimeout(() => this.tone(880, 0.18, { type: 'sine', gain: 0.14 }), 90);
  },
  make3() {
    this.tone(560, 0.10, { type: 'triangle', gain: 0.16, glideTo: 740 });
    setTimeout(() => this.tone(940, 0.14, { type: 'sine', gain: 0.13 }), 80);
    setTimeout(() => this.tone(1180, 0.20, { type: 'sine', gain: 0.12 }), 160);
  },
  miss() {
    this.tone(180, 0.22, { type: 'sine', gain: 0.12, glideTo: 120 });
  },
  turnover() {
    this.noise(0.18, { filterType: 'highpass', filterFreq: 800, gain: 0.16 });
    this.tone(140, 0.16, { type: 'sawtooth', gain: 0.10, glideTo: 90 });
  },
  opponentScore() {
    this.tone(300, 0.14, { type: 'sawtooth', gain: 0.09, glideTo: 220 });
  },
  block() {
    this.noise(0.10, { filterType: 'bandpass', filterFreq: 1400, gain: 0.18 });
  },
  whistleFoul() {
    this.tone(1500, 0.28, { type: 'square', gain: 0.10, glideTo: 1500 });
  },
  buzzer() {
    this.tone(110, 0.9, { type: 'sawtooth', gain: 0.14 });
  },
  catchFire() {
    [660, 880, 1100, 1320].forEach((f, i) => {
      setTimeout(() => this.tone(f, 0.14, { type: 'triangle', gain: 0.12 }), i * 70);
    });
  },
  tipoff() {
    this.tone(440, 0.10, { type: 'square', gain: 0.10 });
    setTimeout(() => this.tone(660, 0.16, { type: 'square', gain: 0.10 }), 100);
  },
  click() {
    this.tone(700, 0.035, { type: 'square', gain: 0.045 });
  },
  timeout() {
    this.tone(330, 0.30, { type: 'square', gain: 0.09, glideTo: 330 });
  },
};

function toggleMute() {
  SFX.muted = !SFX.muted;
  try { localStorage.setItem('pointguard_muted', SFX.muted ? '1' : '0'); } catch (e) {}
  renderScoreboard();
}

(function restoreMutePref() {
  try {
    SFX.muted = localStorage.getItem('pointguard_muted') === '1';
  } catch (e) {}
})();

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ---------------------------------------------------------
// Boot
// ---------------------------------------------------------
randomizeRole();
lastCourtOpts = { possessionTeam: 'home', ballSpotKey: state.ballSpot, scheme: state.cpuDefenseScheme };
showTipOffCard();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
